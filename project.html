<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Pranav Kumaar</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    const t = localStorage.getItem("theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.dataset.theme = t;
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
</head>
<body>
  <div class="page">
    <nav class="nav">
      <a class="nav-name" href="index.html">Pranav Kumaar</a>
      <div class="nav-links">
        <a href="index.html#projects">Projects</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">◐</button>
      </div>
    </nav>

    <a class="back-link" href="index.html#projects">← All projects</a>

    <article class="article">
      <header class="article-header">
        <h1 id="p-title">Loading…</h1>
        <p class="subtitle" id="p-subtitle"></p>
        <div class="tags" id="p-tags"></div>
      </header>
      <div class="article-meta" id="p-meta"></div>
      <img class="article-cover" id="p-cover" alt="" hidden />
      <div class="md" id="p-content"></div>
    </article>

    <footer>
      <span id="footer-copy"></span>
    </footer>
  </div>

  <script src="content/data.js"></script>
  <script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("theme", next);
    });
    document.getElementById("footer-copy").textContent =
      `© ${new Date().getFullYear()} ${SITE.name}`;

    const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    const slug = new URLSearchParams(location.search).get("p");
    const project = PROJECTS.find((p) => p.slug === slug);

    if (!project) {
      document.getElementById("p-title").textContent = "Project not found";
      document.getElementById("p-content").innerHTML =
        '<p>This project doesn\'t exist. <a href="index.html">Back to home.</a></p>';
    } else {
      document.title = `${project.title} — ${SITE.name}`;
      document.getElementById("p-title").textContent = project.title;
      document.getElementById("p-subtitle").textContent = project.subtitle;
      document.getElementById("p-tags").innerHTML =
        project.tags.map((t) => `<span class="tag">${esc(t)}</span>`).join("");

      const meta = document.getElementById("p-meta");
      if (project.repo) meta.innerHTML += `<a href="${esc(project.repo)}" target="_blank" rel="noopener">View code ↗</a>`;
      if (project.demo) meta.innerHTML += `<a href="${esc(project.demo)}" target="_blank" rel="noopener">Live demo ↗</a>`;
      if (project.article) meta.innerHTML += `<a href="${esc(project.article)}" target="_blank" rel="noopener">Read article ↗</a>`;

      if (project.cover) {
        const cover = document.getElementById("p-cover");
        cover.src = project.cover;
        cover.hidden = false;
      }

      fetch(`content/projects/${encodeURIComponent(slug)}.md`)
        .then((r) => (r.ok ? r.text() : Promise.reject()))
        .then((md) => {
          document.getElementById("p-content").innerHTML =
            DOMPurify.sanitize(marked.parse(md));
        })
        .catch(() => {
          document.getElementById("p-content").innerHTML =
            `<p>${esc(project.summary)}</p>`;
        });
    }
  </script>
</body>
</html>
